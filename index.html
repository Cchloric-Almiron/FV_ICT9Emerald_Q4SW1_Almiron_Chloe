<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 SW1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

     <style>

        body{
        background-image:url('https://i.pinimg.com/originals/53/7b/1b/537b1b9106f53b36d5cb6b92d3ed6158.gif');
        background-repeat:no-repeat;
        background-size:cover;
        }

        #Loginbox{
        text-align:center;
        background-color:rgba(255, 192, 203, 0.621);
        box-shadow:10px 20px 11px rgb(209, 87, 130);
        width:450px;
        height:650px;
        padding:50px;
        border-radius:50px;
        margin-top:100px;
        font-family:'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        }

        #google{
            width:300px;
            height:35px;
            background-color:rgba(255, 184, 198, 0.84);
            border-radius:30px;
        }

        #apple{
            width:300px;
            height:35px;
            background-color:rgba(255, 184, 198, 0.84);
            border-radius:30px;
            margin-top:5px;
        }

        #loginbutton{
            width:300px;
            height:35px;
            border-radius:30px;
            background-color:rgba(255, 184, 198, 0.84);
        }



     </style>
</head>
<body>
<center>
    <div id="Loginbox">
        <h1>Welcome back!</h1>
        <h2>Login to continue</h2>

    <br>

    <button id="google" class="btn"><img src="https://scontent-sea5-1.xx.fbcdn.net/v/t1.15752-9/653935151_1946547739563572_2792685723924832732_n.png?_nc_cat=103&ccb=1-7&_nc_sid=9f807c&_nc_ohc=rxNPQ_V23rEQ7kNvwHtm27x&_nc_oc=AdrUsaKvg5QemR21wy2wNTORjLReNMZ6lpM3b701taJEC8fDjLvMF_lGZierOBUZZiotumVsRR9qW9oskaYV75_a&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent-sea5-1.xx&_nc_ss=7a32e&oh=03_Q7cD4wFkso0D0q3GT4rFg8gVFcSBxyR8rwBJwyNKoVbU9_HPMg&oe=69EC788B"style="height:20px; margin-bottom:3px;">  Login with Google</button>

    <br>

    <button id="apple" class="btn"><img src="https://scontent.fmnl4-1.fna.fbcdn.net/v/t1.15752-9/652605566_2015423556078003_4795187742804932028_n.png?_nc_cat=106&ccb=1-7&_nc_sid=0024fc&_nc_ohc=TFV0e8YTGI0Q7kNvwFE3pIQ&_nc_oc=AdoMVLTslhoLNPGnD717n8Be5x0osgyYdCfxNhQmpkgutmfKaO7eFXjqBA8TAdvuOlU&_nc_ad=z-m&_nc_cid=0&_nc_zt=23&_nc_ht=scontent.fmnl4-1.fna&_nc_ss=7a32e&oh=03_Q7cD4wHDkiy1rvCCF42B1h4GbmmU5GaPlPSlEE6GMUo8jj96gw&oe=69EC702C"style="height:20px; margin-bottom:3px;">  Login with Apple</button>

    <br><hr>
    <h6>OR</h6>
    <hr>

    <form>
    <label form="user">Username</label>
    <br>
        <input type="text" id="user" class="form-control" placeholder="Input your username" required>
    
    <br>

    <label form="pass">Password</label>
    <br>
        <input type="password" id="pass" class="form-control" placeholder="Input your password" required>
    </form>

    <br>
    <div class="d-flex gap-4">
        <input type="checkbox" class="form-check-input" id="checkbox" name="checkbox" value="checked" >

        <label class="form-check-label" for="checklog" >Stay Logged in</label>

        <a href="#">Forgot Password?<a>
    </div>

    <br>
    <button class="btn" id="loginbutton" onclick="log()" type="submit">Login</button> 

    <script>

    function log() {

        var user = document.getElementById("user").value;
        var pass = document.getElementById("pass").value;
        var checkbox = document.getElementById("checkbox").checked;
        var message ="";

        if(user === "" || pass === ""){
            alert("Please input your user info");
            return;
        }
        if(user == "IloveICTOMG!" && pass == "ICT6767"){
            alert("Welcome back!");
        }

        else if (user == "wrong username"  && pass =="wrong"){
            alert("Username and Pasword do not match");
        }

        else{
            alert("Please input a valid login");
         }

         switch(checkbox) {
            case true:
            message = "Your session will stay active on this device";
            break;

            case false:
            message = "Session will timeout after closing"; 
            break;

            default:
            message ="";
            }

            alert(message)
    }
    </script>

    </div>
</center>
</body>
</html>
